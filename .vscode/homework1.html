<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .modal {
      background: #ffffff;
      width: 360px;
      border-radius: 10px;
      padding: 25px 20px;
      text-align: center;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .close {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 18px;
      color: #777;
      cursor: pointer;
    }

    .tabs {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .tabs span {
      color: #888;
      cursor: pointer;
    }

    .tabs .active {
      color: #2e7d32;
      font-weight: 600;
    }

    .tabs-divider {
      margin: 0 6px;
      color: #aaa;
    }

    .subtitle {
      font-size: 13px;
      color: #777;
      margin-bottom: 15px;
    }

    .input-group {
      position: relative;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 11px 40px 11px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }

    input::placeholder {
      color: #aaa;
    }

    .eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 14px;
      color: #777;
    }

    .btn {
      width: 100%;
      background: #43a047;
      color: white;
      border: none;
      padding: 11px;
      border-radius: 6px;
      font-size: 14px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn:hover {
      background: #388e3c;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 18px 0;
      font-size: 12px;
      color: #999;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #ddd;
      margin: 0 8px;
    }

    .social-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 13px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .social-btn img {
      width: 16px;
      height: 16px;
    }

    .bottom-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: #2e7d32;
      border-radius: 0 0 10px 10px;
    }
  </style>
</head>
<body>

<div class="modal">
  <div class="close">×</div>

  <div class="tabs">
    <span>Login</span>
    <span class="tabs-divider">|</span>
    <span class="active">Register</span>
  </div>

  <div class="subtitle">Enter your email and password to register.</div>

  <div class="input-group">
    <input type="text" placeholder="Username">
  </div>

  <div class="input-group">
    <input type="email" placeholder="Enter your email address">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Password">
    <span class="eye" onclick="togglePassword()">👁</span>
  </div>

  <div class="input-group">
    <input type="password" placeholder="Confirm Password">
  </div>

  <button class="btn">Register</button>

  <div class="divider">Or register with</div>

  <button class="social-btn">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
    Continue with Google
  </button>

  <button class="social-btn">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg">
    Continue with Facebook
  </button>

  <div class="bottom-line"></div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>

</body>
</html>
